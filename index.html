<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile - จุฬาลัษณ์ แสงผา</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Kanit',sans-serif;
}

body{
    background:linear-gradient(135deg,#5b2c83,#8e44ad,#c39bd3);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.card{
    width:900px;
    max-width:100%;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(15px);
    border-radius:25px;
    overflow:hidden;
    display:flex;
    color:white;
    box-shadow:0 15px 40px rgba(0,0,0,.3);
}

.left{
    width:35%;
    background:rgba(255,255,255,.08);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.avatar{
    width:180px;
    height:180px;
    border-radius:50%;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:90px;
    color:#8e44ad;
    margin-bottom:20px;
}

.left h1{
    font-size:30px;
    text-align:center;
}

.left h3{
    font-weight:300;
    margin-top:10px;
}

.right{
    flex:1;
    padding:50px;
}

.title{
    font-size:35px;
    margin-bottom:30px;
    border-left:8px solid #fff;
    padding-left:15px;
}

.info{
    margin-bottom:20px;
}

.info h2{
    font-size:22px;
    margin-bottom:8px;
    color:#f8d7ff;
}

.info p{
    font-size:18px;
    line-height:1.8;
}

.hobby{
    margin-top:15px;
}

.tag{
    display:inline-block;
    background:white;
    color:#7d3c98;
    padding:10px 18px;
    border-radius:30px;
    margin:5px;
    font-weight:bold;
}

footer{
    margin-top:40px;
    text-align:center;
    font-size:14px;
    color:#eee;
}

@media(max-width:768px){

.card{
    flex-direction:column;
}

.left{
    width:100%;
}

.right{
    padding:30px;
}

.title{
    font-size:28px;
}

}
</style>

</head>
<body>

<div class="card">

<div class="left">

<div class="avatar">
👩
</div>

<h1>จุฬาลัษณ์ แสงผา</h1>
<h3>Computer Engineering Student</h3>

</div>

<div class="right">

<div class="title">
✨ ประวัติส่วนตัว
</div>

<div class="info">
<h2>ชื่อ - นามสกุล</h2>
<p>จุฬาลัษณ์ แสงผา</p>
</div>

<div class="info">
<h2>ชื่อเล่น</h2>
<p>แก้ว</p>
</div>

<div class="info">
<h2>วันเดือนปีเกิด</h2>
<p>10 พฤศจิกายน 2546</p>
</div>

<div class="info">
<h2>กำลังศึกษา</h2>
<p>
มหาวิทยาลัยนครพนม<br>
คณะวิศวกรรมศาสตร์<br>
สาขาวิศวกรรมคอมพิวเตอร์
</p>
</div>

<div class="info hobby">
<h2>สิ่งที่ชอบ ❤️</h2>

<span class="tag">🎬 ซีรีย์จีน</span>
<span class="tag">🇰🇷 ซีรีย์เกาหลี</span>

</div>

<footer>
Designed with 💜 Purple Theme
</footer>

</div>

</div>

</body>
</html>
